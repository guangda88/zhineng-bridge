<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智桥 - 跨平台实时同步和通信SDK</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <div class="app">
        <!-- 头部导航 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🌉</span>
                    <span class="logo-text">智桥</span>
                </div>
                <nav class="nav">
                    <a href="#tools" class="nav-item active">工具</a>
                    <a href="#sessions" class="nav-item">会话</a>
                    <a href="#settings" class="nav-item">设置</a>
                </nav>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main">
            <!-- 工具选择页面 -->
            <section id="tools" class="page active">
                <h2 class="page-title">选择工具</h2>
                <div class="tools-grid" id="toolsGrid">
                    <!-- 工具卡片将通过 JavaScript 动态生成 -->
                </div>
            </section>

            <!-- 会话管理页面 -->
            <section id="sessions" class="page">
                <h2 class="page-title">会话管理</h2>
                <div class="sessions-header">
                    <button class="btn btn-primary" id="newSessionBtn">新建会话</button>
                    <button class="btn btn-secondary" id="refreshSessionsBtn">刷新</button>
                </div>
                <div class="sessions-list" id="sessionsList">
                    <!-- 会话列表将通过 JavaScript 动态生成 -->
                </div>
            </section>

            <!-- 会话详情页面 -->
            <section id="session-detail" class="page">
                <h2 class="page-title">会话详情</h2>
                <div class="session-info" id="sessionInfo">
                    <!-- 会话信息将通过 JavaScript 动态生成 -->
                </div>
                <div class="terminal" id="terminal">
                    <!-- 终端输出将通过 JavaScript 动态生成 -->
                </div>
                <div class="command-input">
                    <input type="text" id="commandInput" placeholder="输入命令..." />
                    <button class="btn btn-primary" id="sendCommandBtn">发送</button>
                </div>
            </section>

            <!-- 设置页面 -->
            <section id="settings" class="page">
                <h2 class="page-title">设置</h2>
                <div class="settings-list" id="settingsList">
                    <!-- 设置列表将通过 JavaScript 动态生成 -->
                </div>
            </section>
        </main>

        <!-- 底部状态栏 -->
        <footer class="footer">
            <div class="footer-content">
                <div class="status-indicator" id="statusIndicator">
                    <span class="status-dot"></span>
                    <span class="status-text">未连接</span>
                </div>
                <div class="footer-nav">
                    <a href="#tools" class="footer-nav-item" data-page="tools">工具</a>
                    <a href="#sessions" class="footer-nav-item" data-page="sessions">会话</a>
                    <a href="#settings" class="footer-nav-item" data-page="settings">设置</a>
                </div>
            </div>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
    <script src="js/tools.js"></script>
    <script src="js/sessions.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/client.js"></script>
</body>
</html>
