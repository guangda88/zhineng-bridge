name: Code Quality

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  lint-python:
    name: Lint Python Code
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black isort pylint

    - name: Check code formatting with Black
      run: |
        black --check --diff .

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff .

    - name: Run pylint
      run: |
        pylint relay-server/*.py phase1/session_manager/*.py --exit-zero

    - name: Check for TODO and FIXME
      run: |
        grep -r "TODO\|FIXME" --include="*.py" --exclude-dir=.git || echo "No TODO/FIXME found"

  lint-javascript:
    name: Lint JavaScript Code
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        npm install -g eslint prettier

    - name: Check JavaScript formatting with Prettier
      run: |
        find web/ui -name "*.js" -type f -exec prettier --check {} + || true

    - name: Check for console.log
      run: |
        grep -r "console\.log" web/ui/ --include="*.js" || echo "No console.log found"

  check-docs:
    name: Check Documentation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check required docs exist
      run: |
        required_docs=(
          "README.md"
          "CHANGELOG.md"
          "QUICKSTART.md"
          "USAGE_GUIDE.md"
          "TROUBLESHOOTING.md"
          "CONTRIBUTING.md"
        )

        for doc in "${required_docs[@]}"; do
          if [ -f "$doc" ]; then
            echo "✓ $doc exists"
          else
            echo "✗ $doc missing"
            exit 1
          fi
        done

    - name: Check for broken links in README
      run: |
        if command -v markdown-link-check &> /dev/null; then
          markdown-link-check README.md || true
        else
          echo "markdown-link-check not installed, skipping"
        fi

    - name: Check examples
      run: |
        if [ -d "examples" ]; then
          echo "✓ examples directory exists"
          python3 -m py_compile examples/basic_usage.py || echo "Warning: basic_usage.py has syntax issues"
        else
          echo "✗ examples directory missing"
          exit 1
        fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Check for hardcoded secrets
      run: |
        grep -rE "(password|api_key|secret|token)\s*=\s*['\"]" \
          --include="*.py" \
          --include="*.js" \
          --exclude-dir=.git \
          --exclude-dir=node_modules || echo "No hardcoded secrets found"

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install pip-audit
      run: |
        pip install pip-audit

    - name: Run pip-audit
      run: |
        pip-audit || true

    - name: Check for outdated packages
      run: |
        pip list --outdated || true

  comprehensive-check:
    name: Comprehensive Check
    runs-on: ubuntu-latest
    needs: [lint-python, lint-javascript, check-docs, security-scan, dependency-check]

    steps:
    - name: All checks passed
      run: |
        echo "✓ All quality checks passed successfully!"
        echo "✓ Python code linted"
        echo "✓ JavaScript code linted"
        echo "✓ Documentation verified"
        echo "✓ Security scan completed"
        echo "✓ Dependencies checked"
