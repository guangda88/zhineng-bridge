name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install websockets
        pip install pytest pytest-cov pytest-asyncio

    - name: Run unit tests
      run: |
        python -m pytest tests/unit/ -v --tb=short

    - name: Run integration tests
      run: |
        python -m pytest tests/integration/ -v --tb=short

    - name: Run E2E tests
      run: |
        python -m pytest tests/e2e/ -v --tb=short

    - name: Run all tests with coverage
      run: |
        python -m pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Check coverage threshold
      run: |
        python -c "
        import xml.etree.ElementTree as ET
        tree = ET.parse('coverage.xml')
        coverage = float(tree.find('.coverage').attrib['line-rate'])
        threshold = 0.70
        if coverage < threshold:
            print(f'Coverage {coverage*100:.2f}% is below threshold {threshold*100}%')
            exit(1)
        print(f'Coverage {coverage*100:.2f}% meets threshold {threshold*100}%')
        "

  test-webui:
    name: Test Web UI
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: |
        if [ -f "web/ui/package.json" ]; then
          cd web/ui
          npm install
        else
          echo "No package.json found, skipping npm install"
        fi

    - name: Check JavaScript files
      run: |
        find web/ui -name "*.js" -type f | head -10

    - name: Validate HTML
      run: |
        if [ -f "web/ui/index.html" ]; then
          echo "HTML file exists"
        else
          echo "Warning: index.html not found"
        fi

  release-verification:
    name: Release Verification
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && contains(github.head_ref, 'release')

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install websockets pytest pytest-cov pytest-asyncio

    - name: Run release verification script
      run: |
        python3 scripts/verify-publish.py

    - name: Check CHANGELOG
      run: |
        if [ -f "CHANGELOG.md" ]; then
          echo "CHANGELOG.md exists"
          grep -q "## \[Unreleased\]" CHANGELOG.md || grep -q "## \[1\." CHANGELOG.md
        else
          echo "Error: CHANGELOG.md not found"
          exit 1
        fi

    - name: Check VERSION file
      run: |
        if [ -f "VERSION" ]; then
          version=$(cat VERSION)
          echo "Version: $version"
        else
          echo "Error: VERSION file not found"
          exit 1
        fi
