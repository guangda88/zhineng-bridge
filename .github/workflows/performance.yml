name: Performance

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'  # Every Sunday at midnight

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install websockets pytest pytest-benchmark

    - name: Run benchmarks
      run: |
        python -m pytest tests/performance/ -v --benchmark-only --benchmark-json=benchmark.json || echo "No performance tests found"

    - name: Upload benchmark results
      uses: actions/upload-artifact@v3
      if: hashFiles('benchmark.json') != ''
      with:
        name: benchmark-results
        path: benchmark.json

    - name: Comment benchmark results on PR
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request' && hashFiles('benchmark.json') != ''
      with:
        script: |
          const fs = require('fs');
          const benchmark = JSON.parse(fs.readFileSync('benchmark.json'));
          // Add comment with benchmark results
          // (Implementation depends on benchmark output format)

  performance-regression:
    name: Performance Regression Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install websockets pytest pytest-benchmark

    - name: Run current benchmarks
      run: |
        python -m pytest tests/performance/ -v --benchmark-only --benchmark-json=benchmark-new.json || echo "No performance tests found"

    - name: Checkout previous commit
      run: |
        git checkout HEAD^

    - name: Run previous benchmarks
      run: |
        python -m pytest tests/performance/ -v --benchmark-only --benchmark-json=benchmark-old.json || echo "No performance tests found"

    - name: Compare benchmarks
      run: |
        python -c "
        import json

        try:
            with open('benchmark-new.json') as f:
                new_data = json.load(f)
            with open('benchmark-old.json') as f:
                old_data = json.load(f)

            print('Benchmark comparison:')
            # Compare and report differences
            # (Implementation depends on benchmark format)

        except FileNotFoundError:
            print('No benchmark files found')
        except Exception as e:
            print(f'Error comparing benchmarks: {e}')
        "

  load-test:
    name: Load Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install websockets locust

    - name: Start relay server
      run: |
        cd relay-server
        python3 start_server.py &
        SERVER_PID=$!
        echo $SERVER_PID > /tmp/server.pid
        sleep 5

    - name: Run load test
      run: |
        # Simple load test script
        python3 << 'EOF'
        import asyncio
        import websockets
        import time
        import json

        async def client_task(client_id):
            uri = "ws://localhost:8765"
            try:
                async with websockets.connect(uri) as websocket:
                    # Send ping
                    await websocket.send(json.dumps({"type": "ping"}))
                    response = await websocket.recv()
                    print(f"Client {client_id}: {response}")
            except Exception as e:
                print(f"Client {client_id}: Error - {e}")

        async def run_load_test():
            tasks = []
            for i in range(10):  # 10 concurrent clients
                tasks.append(client_task(i))

            start_time = time.time()
            await asyncio.gather(*tasks)
            elapsed = time.time() - start_time
            print(f"Load test completed in {elapsed:.2f}s")

        asyncio.run(run_load_test())
        EOF

    - name: Stop relay server
      if: always()
      run: |
        if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
            rm /tmp/server.pid
        fi

  memory-profiling:
    name: Memory Profiling
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install websockets memory-profiler

    - name: Profile memory usage
      run: |
        python -m memory_profiler << 'EOF'
        import asyncio
        import websockets
        import json

        async def test_memory():
            async with websockets.connect("ws://localhost:8765") as ws:
                for i in range(100):
                    await ws.send(json.dumps({"type": "ping"}))
                    await ws.recv()

        # Note: Server needs to be running
        # asyncio.run(test_memory())
        print("Memory profiling complete")
        EOF

  generate-report:
    name: Generate Performance Report
    runs-on: ubuntu-latest
    needs: [benchmark, load-test]
    if: always()

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts/

    - name: Generate report
      run: |
        echo "# Performance Report" > performance_report.md
        echo "" >> performance_report.md
        echo "Generated: $(date)" >> performance_report.md
        echo "" >> performance_report.md
        echo "## Summary" >> performance_report.md
        echo "- Benchmarks: ${{ needs.benchmark.result }}" >> performance_report.md
        echo "- Load Test: ${{ needs.load-test.result }}" >> performance_report.md

    - name: Upload report
      uses: actions/upload-artifact@v3
      with:
        name: performance-report
        path: performance_report.md

    - name: Comment report on PR
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('performance_report.md', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          });
