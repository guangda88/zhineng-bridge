name: Ling-term-mcp 开发工作流
description: 基于 LingMinOpt 架构和 LingFlow 的 Ling-term-mcp（灵犀）开发流程
version: 1.0.0

# 全局配置
config:
  project_name: "Ling-term-mcp"
  project_code_name: "ling-term-mcp"
  chinese_name: "灵犀"
  workspace: "/home/ai/zhineng-bridge/mcp-server"
  optimization_enabled: true
  test_coverage_target: 0.85

# 变量定义（将用于 LingMinOpt 优化）
variables:
  # MCP Server 配置
  mcp_max_connections:
    type: discrete
    values: [50, 100, 200, 500]
    default: 100
    description: 最大并发连接数

  mcp_ping_interval:
    type: discrete
    values: [5, 10, 30, 60]
    default: 10
    description: 心跳间隔（秒）

  mcp_command_timeout:
    type: discrete
    values: [30, 60, 120, 300]
    default: 60
    description: 命令执行超时（秒）

  mcp_output_buffer_size:
    type: discrete
    values: [10000, 50000, 100000, 500000]
    default: 100000
    description: 输出缓冲区大小（字节）

  # 性能优化参数
  session_cache_ttl:
    type: discrete
    values: [300, 600, 1800, 3600]
    default: 3600
    description: 会话缓存存活时间（秒）

  log_level:
    type: discrete
    values: ["debug", "info", "warn", "error"]
    default: "info"
    description: 日志级别

# 阶段定义
phases:
  - id: phase1
    name: 架构设计和环境搭建
    description: 创建项目基础架构和开发环境
    duration: 1 week
    tasks:
      - id: setup_environment
        name: 搭建开发环境
        skills:
          - skill: task-runner
            params:
              command: "npm install --save-dev typescript @types/node tsx @modelcontextprotocol/sdk"
              working_dir: "{{workspace}}"

      - id: create_structure
        name: 创建项目结构
        skills:
          - skill: task-runner
            params:
              command: |
                mkdir -p {{workspace}}/src/{tools,utils,sessions} &&
                mkdir -p {{workspace}}/tests/{unit,integration,e2e} &&
                mkdir -p {{workspace}}/docs
              working_dir: "{{workspace}}"

      - id: create_config
        name: 创建 TypeScript 配置
        skills:
          - skill: code-refactor
            params:
              template_type: "typescript-config"
              output_file: "{{workspace}}/tsconfig.json"

      - id: setup_ci_cd
        name: 配置 CI/CD 流水线
        skills:
          - skill: code-refactor
            params:
              template_type: "github-actions"
              output_file: "{{workspace}}/.github/workflows/ci.yml"

    validation:
      - type: test
        name: 验证环境搭建
        skills:
          - skill: test-runner
            params:
              test_type: "integration"
              target: "{{workspace}}"
        success_criteria:
          - TypeScript 编译通过
          - MCP SDK 导入成功
          - 所有依赖安装完成

  - id: phase2
    name: MCP Server 核心开发
    description: 实现基础 MCP 服务器和核心工具
    duration: 1 week
    tasks:
      - id: implement_core_server
        name: 实现 MCP Server 基础框架
        skills:
          - skill: code-refactor
            params:
              template_type: "mcp-server"
              output_file: "{{workspace}}/src/index.ts"
              features:
                - stdio_transport
                - tool_registry
                - error_handling

      - id: implement_execute_command
        name: 实现 execute_command 工具
        skills:
          - skill: code-refactor
            params:
              template_type: "mcp-tool"
              output_file: "{{workspace}}/src/tools/execute_command.ts"
              tool_name: "execute_command"
              tool_description: "执行终端命令"
              tool_schema:
                command:
                  type: string
                  description: "要执行的命令"
                args:
                  type: array
                  description: "命令参数"
                  items:
                    type: string

      - id: implement_sync_terminal
        name: 实现 sync_terminal 工具
        skills:
          - skill: code-refactor
            params:
              template_type: "mcp-tool"
              output_file: "{{workspace}}/src/tools/sync_terminal.ts"
              tool_name: "sync_terminal"
              tool_description: "同步终端状态"
              tool_schema:
                session_id:
                  type: string
                  description: "会话 ID"

      - id: implement_list_sessions
        name: 实现 list_sessions 工具
        skills:
          - skill: code-refactor
            params:
              template_type: "mcp-tool"
              output_file: "{{workspace}}/src/tools/list_sessions.ts"
              tool_name: "list_sessions"
              tool_description: "列出所有活跃会话"
              tool_schema: {}

      - id: implement_session_manager
        name: 实现 Session Manager
        skills:
          - skill: code-refactor
            params:
              template_type: "session-manager"
              output_file: "{{workspace}}/src/sessions/manager.ts"
              features:
                - create_session
                - destroy_session
                - get_session
                - list_sessions
                - session_persistence

    validation:
      - type: test
        name: 单元测试（覆盖率 > 70%）
        skills:
          - skill: test-runner
            params:
              test_type: "unit"
              target: "{{workspace}}/tests/unit"
              coverage_target: 0.7
        success_criteria:
          - 所有单元测试通过
          - 代码覆盖率 >= 70%
          - 无 TypeScript 类型错误

  - id: phase3
    name: LingMinOpt 参数优化
    description: 使用 LingMinOpt 优化 MCP Server 配置参数
    duration: 3 days
    tasks:
      - id: create_search_space
        name: 创建搜索空间
        skills:
          - skill: code-refactor
            params:
              template_type: "lingminopt-search-space"
              output_file: "{{workspace}}/optimization/search_space.py"
              variables:
                - mcp_max_connections
                - mcp_ping_interval
                - mcp_command_timeout
                - mcp_output_buffer_size
                - session_cache_ttl

      - id: create_evaluator
        name: 创建评估函数
        skills:
          - skill: code-refactor
            params:
              template_type: "lingminopt-evaluator"
              output_file: "{{workspace}}/optimization/evaluator.py"
              metrics:
                - response_time
                - throughput
                - memory_usage
                - error_rate
              weights:
                response_time: 0.4
                throughput: 0.3
                memory_usage: 0.2
                error_rate: 0.1

      - id: run_optimization
        name: 运行 LingMinOpt 优化
        skills:
          - skill: task-runner
            params:
              command: |
                cd {{workspace}}/optimization &&
                python3 optimize_mcp_params.py
              working_dir: "{{workspace}}"
              timeout: 3600

      - id: apply_optimized_params
        name: 应用优化参数
        skills:
          - skill: code-refactor
            params:
              template_type: "apply-optimized-config"
              output_file: "{{workspace}}/config/optimized.json"
              input_file: "{{workspace}}/optimization/best_params.json"

    validation:
      - type: test
        name: 验证优化效果
        skills:
          - skill: test-runner
            params:
              test_type: "performance"
              target: "{{workspace}}"
        success_criteria:
          - 响应时间改善 >= 10%
          - 吞吐量提升 >= 5%
          - 内存使用优化 >= 5%

  - id: phase4
    name: 安全和扩展
    description: 实现安全机制和扩展工具
    duration: 1 week
    tasks:
      - id: implement_security
        name: 实现安全验证机制
        skills:
          - skill: code-refactor
            params:
              template_type: "security-layer"
              output_file: "{{workspace}}/src/security/validator.ts"
              features:
                - command_whitelist
                - command_blacklist
                - permission_checks
                - command_sandbox

      - id: implement_additional_tools
        name: 实现额外工具
        skills:
          - skill: code-refactor
            params:
              template_type: "mcp-tool"
              output_files:
                - "{{workspace}}/src/tools/get_working_directory.ts"
                - "{{workspace}}/src/tools/change_directory.ts"
                - "{{workspace}}/src/tools/kill_process.ts"
                - "{{workspace}}/src/tools/get_process_list.ts"

    validation:
      - type: test
        name: 安全测试
        skills:
          - skill: test-runner
            params:
              test_type: "security"
              target: "{{workspace}}/tests/security"
        success_criteria:
          - 所有安全测试通过
          - 未授权命令被正确拦截

  - id: phase5
    name: 测试和文档
    description: 完成集成测试和文档编写
    duration: 1 week
    tasks:
      - id: integration_tests
        name: 编写集成测试
        skills:
          - skill: code-refactor
            params:
              template_type: "integration-tests"
              output_dir: "{{workspace}}/tests/integration"

      - id: e2e_tests
        name: 端到端测试
        skills:
          - skill: test-runner
            params:
              test_type: "e2e"
              target: "{{workspace}}/tests/e2e"
              scenarios:
                - mcp_client_connection
                - tool_execution
                - error_handling
                - performance_stress

      - id: write_documentation
        name: 编写文档
        skills:
          - skill: task-runner
            params:
              command: |
                # README
                cat > {{workspace}}/README.md << 'EOF'
                # Ling-term-mcp（灵犀）

                AI 终端操作的 MCP 服务器

                ## 快速开始

                ```bash
                npm install
                npm run build
                npm start
                ```

                EOF

                # API 文档
                npm run docs

      - id: performance_stress_test
        name: 性能压测
        skills:
          - skill: test-runner
            params:
              test_type: "performance"
              target: "{{workspace}}"
              concurrent_connections: 100
              duration: 300

    validation:
      - type: test
        name: 最终验证
        skills:
          - skill: test-runner
            params:
              test_type: "all"
              target: "{{workspace}}"
        success_criteria:
          - 所有测试通过
          - 代码覆盖率 >= 85%
          - 性能指标达标

  - id: phase6
    name: 部署和发布
    description: 部署到生产环境和发布
    duration: 3 days
    tasks:
      - id: build_package
        name: 构建发布包
        skills:
          - skill: task-runner
            params:
              command: |
                npm run build &&
                npm pack
              working_dir: "{{workspace}}"

      - id: deploy_production
        name: 部署到生产环境
        skills:
          - skill: task-runner
            params:
              command: |
                # Docker 构建
                docker build -t ling-term-mcp:latest .
                docker push registry.example.com/ling-term-mcp:latest

      - id: publish_npm
        name: 发布到 NPM
        skills:
          - skill: task-runner
            params:
              command: npm publish
              working_dir: "{{workspace}}"

      - id: release_github
        name: GitHub 发布
        skills:
          - skill: task-runner
            params:
              command: |
                gh release create v1.0.0 \
                  --title "Ling-term-mcp v1.0.0 - 灵犀" \
                  --notes "首个正式发布：AI 终端操作 MCP 服务器"

# 监控和报告
monitoring:
  performance_metrics:
    - response_time
    - throughput
    - memory_usage
    - error_rate
    - test_coverage

  alerts:
    - condition: test_coverage < 0.7
      action: notify
      message: "代码覆盖率低于 70%"

    - condition: error_rate > 0.05
      action: notify
      message: "错误率超过 5%"

    - condition: response_time > 200
      action: notify
      message: "响应时间超过 200ms"

# LingMinOpt 集成
lingminopt:
  enabled: true
  config_path: "{{workspace}}/optimization/config.yaml"
  results_path: "{{workspace}}/optimization/results.json"
  max_iterations: 50
  strategy: "grid_search"

  # 优化目标
  objectives:
    - minimize: response_time
      weight: 0.4
    - maximize: throughput
      weight: 0.3
    - minimize: memory_usage
      weight: 0.2
    - minimize: error_rate
      weight: 0.1
